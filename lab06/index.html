<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторная работа №6: Имитационное моделирование</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Имитационное моделирование случайных величин</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="discrete">
          Дискретная СВ
        </button>
        <button class="tab-btn" data-tab="normal">Нормальная СВ</button>
      </div>

      <!-- Вкладка: Дискретная СВ -->
      <div id="discreteTab" class="tab-content active">
        <div class="params">
          <div class="param-item">
            <label>Зерно (seed)</label>
            <input type="number" id="discreteSeed" value="12345" min="1" />
          </div>
          <div class="param-item">
            <label>Вероятности p1..p5</label>
            <div class="prob-inputs">
              <input
                type="number"
                id="p1"
                value="0.1"
                step="0.05"
                min="0"
                max="1"
              />
              <input
                type="number"
                id="p2"
                value="0.2"
                step="0.05"
                min="0"
                max="1"
              />
              <input
                type="number"
                id="p3"
                value="0.3"
                step="0.05"
                min="0"
                max="1"
              />
              <input
                type="number"
                id="p4"
                value="0.25"
                step="0.05"
                min="0"
                max="1"
              />
              <input
                type="number"
                id="p5"
                value="0.15"
                step="0.05"
                min="0"
                max="1"
              />
            </div>
            <div class="prob-sum">Сумма: <span id="sumProb">1.00</span></div>
          </div>
        </div>
        <div class="controls">
          <button class="btn-primary" data-n="10">N = 10</button>
          <button class="btn-primary" data-n="100">N = 100</button>
          <button class="btn-primary" data-n="1000">N = 1000</button>
          <button class="btn-primary" data-n="10000">N = 10000</button>
        </div>
        <div class="results">
          <table id="discreteStats">
            <thead>
              <tr>
                <th>Значение</th>
                <th>Теор. вер.</th>
                <th>Эмп. вер.</th>
                <th>Частота</th>
              </tr>
            </thead>
            <tbody id="discreteFreqBody"></tbody>
          </table>
          <div class="chart-container">
            <canvas id="discreteChart"></canvas>
          </div>
          <div id="discreteSummary"></div>
        </div>
      </div>

      <!-- Вкладка: Нормальная СВ -->
      <div id="normalTab" class="tab-content">
        <div class="params">
          <div class="param-item">
            <label>Зерно (seed)</label>
            <input type="number" id="normalSeed" value="12345" min="1" />
          </div>
          <div class="param-item">
            <label>Среднее μ</label>
            <input type="number" id="mu" value="0" step="0.5" />
          </div>
          <div class="param-item">
            <label>Дисперсия σ²</label>
            <input type="number" id="sigma2" value="1" step="0.5" min="0.1" />
          </div>
        </div>
        <div class="controls">
          <button class="btn-primary" data-n="10">N = 10</button>
          <button class="btn-primary" data-n="100">N = 100</button>
          <button class="btn-primary" data-n="1000">N = 1000</button>
          <button class="btn-primary" data-n="10000">N = 10000</button>
        </div>
        <div class="chart-container">
          <canvas id="histogram"></canvas>
        </div>
        <div id="normalSummary" class="summary"></div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
